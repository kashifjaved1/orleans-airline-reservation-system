apiVersion: apps/v1
kind: Deployment
metadata:
  name: orion-airline-api
  namespace: airline-prod
  labels:
    app: orion-airline-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: orion-airline-api
  template:
    metadata:
      labels:
        app: orion-airline-api
    spec:
      containers:
      - name: orion-airline-api
        image: gcr.io/orion-airline-prod/orion-api:v1.0.0
        ports:
        - containerPort: 80
          name: http
        - containerPort: 11111
          name: orleans-cluster
        - containerPort: 30000
          name: orleans-gateway
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: ConnectionStrings__DefaultConnection
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: connection-string
        - name: ORLEANS_KUBERNETES_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        resources:
          limits:
            cpu: "2"
            memory: 2Gi
          requests:
            cpu: "500m"
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health/live
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: orion-airline-service
  namespace: airline-prod
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    name: http
  selector:
    app: orion-airline-api

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: orion-airline-hpa
  namespace: airline-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: orion-airline-api
  minReplicas: 3
  maxReplicas: 15
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
